ktor {

    deployment {
        host = 0.0.0.0
        port = 10000
        port = ${?PORT}
        environment = ${?ENV}
    }

    application {
        modules = [ homeaq.dothattask.ApplicationKt.module ]
    }

    postgres {
        url = ${DB_URL}
        user = ${DB_USER}
        password = ${DB_PASSWORD}
    }

    database {
            embedded = ${DB_EMB}
        }

    jwt {
        secret = ${JWT_SECRET}
        issuer = ${JWT_ISSUER}
        audience = ${JWT_AUDIENCE}
        realm = ${JWT_REALM}
        accessTtlMinutes = 15
        accessTtlMinutes = ${?JWT_ACCESS_TTL_MIN}
        refreshTtlDays = 30
        refreshTtlDays = ${?JWT_REFRESH_TTL_DAYS}
    }

    # Firebase Admin SDK. Optional — if neither this property nor the
    # GOOGLE_APPLICATION_CREDENTIALS env var is set, push notifications
    # become a no-op and the rest of the app boots normally.
    firebase {
        credentialsPath = ${?FIREBASE_CREDENTIALS_PATH}
    }
}