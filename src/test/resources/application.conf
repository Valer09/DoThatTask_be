ktor {

    deployment {
        host = 0.0.0.0
        port = 10000
        environment = "dev"
    }

    application {
        modules = [ homeaq.dothattask.ApplicationKt.module ]
    }

    postgres {
        url = ""
        user = ""
        password = ""
    }

    database {
        embedded = true
    }

    jwt {
        secret = "test-secret"
        issuer = "dothattask"
        audience = "dothattask-app"
        realm = "dothattask"
        accessTtlMinutes = 15
        refreshTtlDays = 30
    }
}
